name: "HoverStare"
description: "Repo-aware AI code review: agentic multi-pass review with voting, precise inline comments, and incremental finding tracking"
author: "liuchong"

branding:
  icon: "eye"
  color: "green"

inputs:
  version:
    description: "hoverstare 版本（GitHub Release tag，如 v0.0.1）"
    required: false
    default: "v0.0.1"

runs:
  using: "composite"
  steps:
    - name: Resolve platform
      id: platform
      shell: bash
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64) target="x86_64-unknown-linux-musl" ;;
          *) echo "::error::unsupported platform: ${{ runner.os }}-${{ runner.arch }}（v1 仅支持 linux-x64）"; exit 1 ;;
        esac
        echo "target=$target" >> "$GITHUB_OUTPUT"

    - name: Cache hoverstare binary
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/hoverstare-bin
        key: hoverstare-${{ inputs.version }}-${{ steps.platform.outputs.target }}

    - name: Download hoverstare
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        TARGET: ${{ steps.platform.outputs.target }}
      run: |
        set -euo pipefail
        mkdir -p "${{ runner.temp }}/hoverstare-bin"
        cd "${{ runner.temp }}/hoverstare-bin"
        base="https://github.com/liuchong/hoverstare/releases/download/${VERSION}"
        curl -fsSL "${base}/hoverstare-${VERSION}-${TARGET}.tar.gz" -o hoverstare.tar.gz
        curl -fsSL "${base}/hoverstare-${VERSION}-${TARGET}.tar.gz.sha256" -o hoverstare.sha256
        echo "$(cat hoverstare.sha256)  hoverstare.tar.gz" | sha256sum -c -
        tar xzf hoverstare.tar.gz
        chmod +x hoverstare

    - name: Run hoverstare
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        case "${{ github.event_name }}" in
          issue_comment|pull_request_review_comment)
            "${{ runner.temp }}/hoverstare-bin/hoverstare" mention ;;
          *)
            "${{ runner.temp }}/hoverstare-bin/hoverstare" review ;;
        esac
