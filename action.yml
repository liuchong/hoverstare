name: "HoverStare"
description: "Repo-aware AI code review: agentic multi-pass review with voting, precise inline comments, and incremental finding tracking"
author: "liuchong"

branding:
  icon: "eye"
  color: "green"

inputs:
  version:
    description: "hoverstare 版本（GitHub Release tag，如 v0.0.7）"
    required: false
    default: "v0.0.7"
  app_id:
    description: "可选：HoverStare GitHub App 的 App ID（品牌身份模式，评论显示 hoverstare[bot]）"
    required: false
    default: ""
  app_private_key:
    description: "可选：HoverStare GitHub App 的 private key（与 app_id 配套）"
    required: false
    default: ""
  gh_pat:
    description: "可选：classic PAT（repo scope），开发模式的 git push 用它（PAT 推送可触发 CI；App 未开 contents:write 权限前的替代）"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Resolve platform
      id: platform
      shell: bash
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64) target="x86_64-unknown-linux-musl" ;;
          *) echo "::error::unsupported platform: ${{ runner.os }}-${{ runner.arch }}（v1 仅支持 linux-x64）"; exit 1 ;;
        esac
        echo "target=$target" >> "$GITHUB_OUTPUT"

    # 显式固定 Actions token：create-github-app-token 会替换后续步骤的
    # github.token 上下文（App token 无 cache 写权限，post-cache 会报 warning）
    - name: Cache hoverstare binary
      id: cache
      uses: actions/cache@v4
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        path: ${{ runner.temp }}/hoverstare-bin
        key: hoverstare-${{ inputs.version }}-${{ steps.platform.outputs.target }}

    - name: Download hoverstare
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        TARGET: ${{ steps.platform.outputs.target }}
      run: |
        set -euo pipefail
        mkdir -p "${{ runner.temp }}/hoverstare-bin"
        cd "${{ runner.temp }}/hoverstare-bin"
        base="https://github.com/liuchong/hoverstare/releases/download/${VERSION}"
        curl -fsSL "${base}/hoverstare-${VERSION}-${TARGET}.tar.gz" -o hoverstare.tar.gz
        curl -fsSL "${base}/hoverstare-${VERSION}-${TARGET}.tar.gz.sha256" -o hoverstare.sha256
        echo "$(cat hoverstare.sha256)  hoverstare.tar.gz" | sha256sum -c -
        tar xzf hoverstare.tar.gz
        chmod +x hoverstare

    # 品牌身份模式：提供 app_id 时，用 GitHub App installation token 发评论
    # （显示 hoverstare[bot] 而非 github-actions[bot]）
    - name: Create App token (brand identity)
      if: inputs.app_id != ''
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}

    # Route events (spec 09 review/mention, spec 11 develop):
    #   pull_request                    -> review
    #   issues.opened / pure-issue comments with @hoverstare -> develop
    #   PR comments: review|explain|help|bare -> mention; anything else -> develop
    #   pull_request_review(_comment)   -> develop (task) unless mention command
    - name: Run hoverstare
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.app_id != '' && steps.app-token.outputs.token || github.token }}
        GH_PAT: ${{ inputs.gh_pat }}
      run: |
        set -euo pipefail
        bin="${{ runner.temp }}/hoverstare-bin/hoverstare"
        cmd="review"
        case "${{ github.event_name }}" in
          issues)
            cmd="develop" ;;
          issue_comment)
            if jq -e '.issue.pull_request == null' "$GITHUB_EVENT_PATH" >/dev/null; then
              cmd="develop"
            else
              after=$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH" \
                | { grep -oE '@hoverstare.*' || true; } | head -1)
              after="$(echo "${after#@hoverstare}" | xargs || true)"
              word="$(echo "$after" | awk '{print tolower($1)}')"
              if [ -z "$after" ] || [ "$word" = "review" ] || [ "$word" = "explain" ] || [ "$word" = "help" ]; then
                cmd="mention"
              else
                cmd="develop"
              fi
            fi ;;
          pull_request_review_comment|pull_request_review)
            after=$(jq -r '.comment.body // .review.body // ""' "$GITHUB_EVENT_PATH" \
              | { grep -oE '@hoverstare.*' || true; } | head -1)
            after="$(echo "${after#@hoverstare}" | xargs || true)"
            word="$(echo "$after" | awk '{print tolower($1)}')"
            if [ -z "$after" ] || [ "$word" = "review" ] || [ "$word" = "explain" ] || [ "$word" = "help" ]; then
              cmd="mention"
            else
              cmd="develop"
            fi ;;
          *)
            cmd="review" ;;
        esac
        "$bin" "$cmd"
