  <path d="M49 66 L41 66" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M50 74 L42 78" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M74 58 L82 55" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M75 66 L83 66" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M74 74 L82 78" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
</svg>
