  <path d="M57 41 Q53 34 49 32" stroke="#ffffff" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <path d="M67 41 Q71 34 75 32" stroke="#ffffff" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- 背线 -->
  <line x1="62" y1="54" x2="62" y2="80" stroke="#1a7f37" stroke-width="2.4"/>
  <!-- 腿（左三右三） -->
