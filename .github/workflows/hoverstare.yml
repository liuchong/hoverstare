# 本仓库自举（dogfood）：用 hoverstare 审查 hoverstare 自己的 PR，
# 并运行 spec 11 的开发模式（issue 讨论/计划、PR 分支开发、合并命令）。
# 与用户侧接法的区别：这里从源码构建二进制（避免鸡生蛋问题），
# 用户应使用 action.yml（下载预编译二进制，见 README）。
name: HoverStare (dogfood)

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  # 不含 @hoverstare 的评论/review 事件给独立组名：run 级并发组先于 job if 生效，
  # 否则 bot 自己发的 review（pull_request_review 事件）会取消正在跑的审查
  group: >-
    hoverstare-${{
      ((github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
        && !(contains(github.event.comment.body, '@hoverstare')
          && (github.event.comment.user.login != 'hoverstare[bot]' || startsWith(github.event.comment.body, '@hoverstare continue')))
        && format('noop-{0}', github.event.comment.id))
      || (github.event_name == 'pull_request_review'
        && !contains(github.event.review.body, '@hoverstare')
        && format('noop-review-{0}', github.event.review.id))
      || (github.event.pull_request.number || github.event.issue.number)
    }}
  cancel-in-progress: true

jobs:
  hoverstare:
    runs-on: ubuntu-latest
    # bot 自己的评论一律不触发，除非是自触发命令（spec 11 §6 熔断由 devagent 轮次计数保证）
    if: >-
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@hoverstare')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@hoverstare') && github.event.review.user.login != 'hoverstare[bot]') ||
      (contains(github.event.comment.body, '@hoverstare') &&
        (github.event.comment.user.login != 'hoverstare[bot]' || startsWith(github.event.comment.body, '@hoverstare continue')))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # show_base_file 需要 base 分支历史

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      # 品牌身份：评论/推送用 hoverstare[bot]（App token 可触发 CI）
      - name: Create App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HOVERSTARE_APP_ID }}
          private-key: ${{ secrets.HOVERSTARE_APP_PRIVATE_KEY }}

      # 路由（spec 09/11）：pull_request -> review；纯 issue -> develop；
      # PR 评论 review|explain|help|空 -> mention；其余 -> develop
      - name: Run hoverstare
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
          OPENAI_API_KEY: ${{ secrets.HOVERSTARE_LLM_KEY }}
          OPENAI_BASE_URL: ${{ vars.HOVERSTARE_LLM_BASE_URL }}
        run: |
          set -euo pipefail
          bin=./target/release/hoverstare
          cmd="review"
          case "${{ github.event_name }}" in
            issues)
              cmd="develop" ;;
            issue_comment)
              if jq -e '.issue.pull_request == null' "$GITHUB_EVENT_PATH" >/dev/null; then
                cmd="develop"
              else
                after=$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH" \
                  | { grep -oE '@hoverstare.*' || true; } | head -1)
                after="$(echo "${after#@hoverstare}" | xargs || true)"
                word="$(echo "$after" | awk '{print tolower($1)}')"
                if [ -z "$after" ] || [ "$word" = "review" ] || [ "$word" = "explain" ] || [ "$word" = "help" ]; then
                  cmd="mention"
                else
                  cmd="develop"
                fi
              fi ;;
            pull_request_review_comment|pull_request_review)
              after=$(jq -r '.comment.body // .review.body // ""' "$GITHUB_EVENT_PATH" \
                | { grep -oE '@hoverstare.*' || true; } | head -1)
              after="$(echo "${after#@hoverstare}" | xargs || true)"
              word="$(echo "$after" | awk '{print tolower($1)}')"
              if [ -z "$after" ] || [ "$word" = "review" ] || [ "$word" = "explain" ] || [ "$word" = "help" ]; then
                cmd="mention"
              else
                cmd="develop"
              fi ;;
            *)
              cmd="review" ;;
          esac
          "$bin" "$cmd"
