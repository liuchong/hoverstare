name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      # aws-lc-sys（rustls）需要 musl 交叉编译器（spec 08）
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build musl binary
        run: |
          cargo build --release --target x86_64-unknown-linux-musl
          strip target/x86_64-unknown-linux-musl/release/hoverstare

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          name="hoverstare-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl"
          cd target/x86_64-unknown-linux-musl/release
          tar czf "../../../dist/${name}.tar.gz" hoverstare
          cd ../../../dist
          sha256sum "${name}.tar.gz" | awk '{print $1}' > "${name}.tar.gz.sha256"
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
